<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowLingo – Multilingual Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --mint:        #34d399;
            --mint-dark:   #059669;
            --mint-soft:   #ecfdf5;
            --mint-mid:    #6ee7b7;
            --mint-border: #a7f3d0;

            --sky:         #38bdf8;
            --sky-soft:    #f0f9ff;
            --sky-border:  #bae6fd;
            --sky-dark:    #0369a1;

            --peach:       #fb923c;
            --peach-soft:  #fff7ed;
            --peach-border:#fed7aa;
            --peach-dark:  #c2410c;

            --violet:      #a78bfa;
            --violet-soft: #f5f3ff;
            --violet-border:#ddd6fe;
            --violet-dark: #7c3aed;

            --rose:        #fb7185;
            --rose-soft:   #fff1f2;
            --rose-border: #fecdd3;

            --amber:       #fbbf24;
            --amber-soft:  #fffbeb;
            --amber-border:#fde68a;
            --amber-dark:  #92400e;

            --text:    #1c2b20;
            --text-2:  #4b6358;
            --text-3:  #9ab8aa;

            --surface: #ffffff;
            --bg:      #f3f9f5;
            --bg-2:    #e8f2ec;
            --border:  #d0e8da;

            --r:    18px;
            --r-sm: 12px;
            --r-xs: 8px;
            --sh-sm: 0 1px 4px rgba(0,70,35,.06);
            --sh:    0 4px 20px rgba(0,70,35,.09), 0 1px 4px rgba(0,70,35,.05);
            --sh-lg: 0 12px 40px rgba(0,70,35,.12), 0 4px 12px rgba(0,70,35,.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--mint-border); border-radius: 4px; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ─── HEADER ─── */
        .hdr {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 40;
        }
        .hdr-inner {
            max-width: 960px; margin: 0 auto;
            padding: 10px 20px;
            display: flex; align-items: center; gap: 14px;
        }

        .logo { display: flex; align-items: center; gap: 9px; flex-shrink: 0; text-decoration: none; }
        .logo-icon {
            width: 36px; height: 36px; border-radius: 11px;
            background: linear-gradient(145deg, #34d399 0%, #059669 100%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(5,150,105,.32), inset 0 1px 0 rgba(255,255,255,.25);
            flex-shrink: 0;
        }
        .logo-icon svg { display: block; transition: transform .1s; }
        .logo-icon:hover svg { animation: cloverPop .65s cubic-bezier(.34,1.56,.64,1) forwards; }
        @keyframes cloverPop {
            0%   { transform: rotate(0deg) scale(1); }
            40%  { transform: rotate(18deg) scale(1.12); }
            100% { transform: rotate(0deg) scale(1); }
        }
        .logo-name { font-family: 'DM Serif Display', serif; font-size: 19px; color: var(--text); }

        .hdr-search {
            flex: 1; max-width: 360px;
            display: flex; align-items: center;
            background: var(--bg); border: 1.5px solid var(--border);
            border-radius: 999px; overflow: hidden; transition: border-color .2s, box-shadow .2s;
        }
        .hdr-search:focus-within { border-color: var(--mint); box-shadow: 0 0 0 3px rgba(52,211,153,.15); }
        .hdr-search-icon { padding: 0 10px 0 14px; color: var(--text-3); font-size: 13px; pointer-events: none; }
        .hdr-search input {
            flex: 1; border: none; background: none; outline: none;
            font-family: inherit; font-size: 13px; color: var(--text); padding: 9px 0;
        }
        .hdr-search input::placeholder { color: var(--text-3); }
        .hdr-search select {
            border: none; background: none; outline: none;
            border-left: 1.5px solid var(--border); padding: 9px 10px;
            font-size: 11px; font-weight: 600; color: var(--text-2); cursor: pointer; font-family: inherit;
        }
        .hdr-search-btn {
            background: var(--mint); border: none; color: white;
            padding: 9px 14px; cursor: pointer; font-size: 12px; transition: background .2s; flex-shrink: 0;
        }
        .hdr-search-btn:hover { background: var(--mint-dark); }

        .lang-group { display: flex; gap: 3px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 999px; padding: 3px; flex-shrink: 0; }
        .lang-btn {
            padding: 5px 12px; border-radius: 999px; border: none;
            font-size: 11px; font-weight: 700; cursor: pointer;
            color: var(--text-3); background: none; transition: all .2s; font-family: inherit;
        }
        .lang-btn:hover { color: var(--text-2); }
        .lang-btn.active { background: var(--mint); color: white; box-shadow: 0 2px 8px rgba(52,211,153,.3); }

        .user-btn {
            width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
            background: var(--bg); border: 1.5px solid var(--border);
            color: var(--text-2); cursor: pointer; font-size: 13px;
            display: flex; align-items: center; justify-content: center; transition: all .2s;
        }
        .user-btn:hover { border-color: var(--mint); color: var(--mint-dark); }

        /* ─── SEARCH RESULT ─── */
        #searchResult { max-width: 960px; margin: 0 auto; padding: 0 20px 16px; }
        .result-card { background: var(--surface); border-radius: var(--r); border: 1.5px solid var(--border); padding: 20px; box-shadow: var(--sh); }

        /* ─── MAIN ─── */
        .main { max-width: 960px; margin: 0 auto; padding: 22px 20px 40px; }

        /* ─── DAILY ─── */
        .daily {
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: var(--r); padding: 22px 24px; margin-bottom: 28px;
            box-shadow: var(--sh); position: relative; overflow: hidden;
        }
        .daily::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--mint),var(--sky),var(--violet)); }

        .daily-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--mint-soft); border: 1px solid var(--mint-border);
            color: var(--mint-dark); font-size: 11px; font-weight: 700;
            letter-spacing: .5px; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; margin-bottom: 14px;
        }
        .daily-rows { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
        .daily-row { display: flex; align-items: flex-start; gap: 10px; }

        .ltag { font-size: 9px; font-weight: 800; letter-spacing: .7px; text-transform: uppercase; padding: 3px 7px; border-radius: 5px; flex-shrink: 0; margin-top: 2px; }
        .ltag.ko { background: var(--violet-soft); color: var(--violet-dark); border: 1px solid var(--violet-border); }
        .ltag.en { background: var(--sky-soft);    color: var(--sky-dark);    border: 1px solid var(--sky-border); }
        .ltag.es { background: var(--peach-soft);  color: var(--peach-dark);  border: 1px solid var(--peach-border); }

        .daily-text { font-size: 14.5px; color: var(--text-2); line-height: 1.55; flex: 1; }
        .daily-text.main { font-size: 16px; font-weight: 600; color: var(--text); }

        .daily-foot { display: flex; align-items: center; justify-content: space-between; padding-top: 14px; border-top: 1px solid var(--border); }
        .daily-acts { display: flex; gap: 6px; }
        .dact {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 12px; border-radius: 999px; border: 1.5px solid var(--border);
            background: none; font-size: 12px; font-weight: 600; color: var(--text-2);
            cursor: pointer; font-family: inherit; transition: all .2s;
        }
        .dact:hover { border-color: var(--mint-border); color: var(--mint-dark); background: var(--mint-soft); }
        .dact.fav.on { border-color: var(--rose-border); color: var(--rose); background: var(--rose-soft); }

        .daily-detail { margin-top: 14px; background: var(--bg); border-radius: var(--r-xs); border: 1px solid var(--border); padding: 12px 15px; font-size: 13px; color: var(--text-2); line-height: 1.65; }

        /* ─── SECTION HEAD ─── */
        .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .sec-ttl { font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
        .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--mint); }
        .pip.s { background: var(--sky); }
        .pip.p { background: var(--peach); }

        .ico-btn {
            display: flex; align-items: center; gap: 5px; padding: 5px 12px;
            border-radius: 999px; border: 1.5px solid var(--border); background: none;
            font-size: 12px; font-weight: 600; color: var(--text-3); cursor: pointer; font-family: inherit; transition: all .2s;
        }
        .ico-btn:hover { border-color: var(--mint-border); color: var(--mint-dark); background: var(--mint-soft); }

        /* ─── GRAMMAR ─── */
        .gram-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px; }
        @media (max-width:600px) { .gram-grid { grid-template-columns: 1fr; } }

        .gram-card { background: var(--surface); border-radius: var(--r); border: 1.5px solid var(--border); box-shadow: var(--sh-sm); overflow: hidden; transition: box-shadow .2s, transform .2s; }
        .gram-card:hover { box-shadow: var(--sh); transform: translateY(-2px); }

        .gram-top { padding: 14px 16px 0; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .gram-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; }
        .gram-pill.ko { background: var(--violet-soft); color: var(--violet-dark); border: 1px solid var(--violet-border); }
        .gram-pill.es { background: var(--peach-soft);  color: var(--peach-dark);  border: 1px solid var(--peach-border); }

        .play-icon {
            width: 28px; height: 28px; border-radius: 50%; background: var(--bg);
            border: 1.5px solid var(--border); color: var(--text-3); font-size: 11px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s;
        }
        .play-icon:hover { background: var(--mint-soft); border-color: var(--mint-border); color: var(--mint-dark); }

        .gram-body { padding: 0 16px 14px; }
        .gram-ttl { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 7px; }
        .gram-ex { font-size: 13px; color: var(--text-2); background: var(--bg); border-radius: var(--r-xs); padding: 8px 12px; margin-bottom: 7px; line-height: 1.5; border-left: 3px solid var(--mint-border); }
        .gram-note { font-size: 12px; color: var(--text-3); line-height: 1.5; }
        .gram-detail { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-2); line-height: 1.6; }

        .gram-foot { padding: 10px 16px 14px; display: flex; gap: 6px; }
        .gact {
            flex: 1; padding: 7px 4px; border-radius: var(--r-xs); border: 1.5px solid transparent;
            font-size: 11.5px; font-weight: 700; cursor: pointer; font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 4px; transition: all .2s;
        }
        .gact.lrn  { background: var(--sky-soft);   color: var(--sky-dark);   border-color: var(--sky-border); }
        .gact.lrn:hover  { background: var(--sky); color: white; border-color: var(--sky); }
        .gact.rev  { background: var(--amber-soft); color: var(--amber-dark); border-color: var(--amber-border); }
        .gact.rev:hover  { background: var(--amber); color: white; border-color: var(--amber); }
        .gact.fav  { background: var(--rose-soft);  color: var(--rose);       border-color: var(--rose-border); }
        .gact.fav:hover  { background: var(--rose); color: white; border-color: var(--rose); }

        /* ─── WORD SECTION ─── */
        .word-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
        .theme-tabs { display: flex; gap: 6px; overflow-x: auto; }
        .theme-tabs::-webkit-scrollbar { display: none; }
        .ttab {
            padding: 6px 15px; border-radius: 999px; border: 1.5px solid var(--border);
            font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
            background: var(--surface); color: var(--text-2); transition: all .2s; font-family: inherit;
        }
        .ttab:hover { border-color: var(--mint-border); color: var(--mint-dark); }
        .ttab.active { background: var(--mint); color: white; border-color: var(--mint); box-shadow: 0 2px 8px rgba(52,211,153,.3); }

        /* Filter tabs */
        .filter-tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; }
        .filter-tabs::-webkit-scrollbar { display: none; }
        .ftab {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 14px; border-radius: 999px; border: 1.5px solid var(--border);
            font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
            background: var(--surface); color: var(--text-3); transition: all .2s; font-family: inherit;
        }
        .ftab:hover { border-color: var(--text-3); color: var(--text-2); }
        .ftab.active { background: var(--text); color: white; border-color: var(--text); }
        .ftab .cnt { font-size: 10px; font-weight: 800; padding: 1px 6px; border-radius: 999px; background: rgba(255,255,255,.18); }
        .ftab:not(.active) .cnt { background: var(--bg-2); color: var(--text-3); }

        /* ─── WORD GRID ─── */
        .word-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
        @media (max-width:680px) { .word-grid { grid-template-columns: repeat(2,1fr); } }
        @media (max-width:420px) { .word-grid { grid-template-columns: 1fr; } }

        /* Wrapper for overflow trick */
        .wcard-wrap { position: relative; overflow: hidden; border-radius: var(--r); }

        .wcard {
            background: var(--surface); border-radius: var(--r); border: 1.5px solid var(--border);
            box-shadow: var(--sh-sm); transition: all .25s;
        }
        .wcard:hover { box-shadow: var(--sh); border-color: var(--mint-border); }
        .wcard.learned { border-color: var(--mint-border); }
        .wcard.review  { border-color: var(--amber-border); }

        .wcard-body { padding: 16px 16px 10px; cursor: pointer; user-select: none; }
        .wcard-main { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.15; margin-bottom: 11px; display: flex; align-items: center; gap: 6px; }
        .sdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .sdot.learned { background: var(--mint); }
        .sdot.review  { background: var(--amber); }

        .wcard-langs { display: flex; flex-direction: column; gap: 6px; }
        .wcard-lang  { display: flex; align-items: baseline; gap: 7px; }
        .wt { font-size: 9px; font-weight: 800; letter-spacing: .6px; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
        .wt.ko { background: var(--violet-soft); color: var(--violet-dark); }
        .wt.en { background: var(--sky-soft);    color: var(--sky-dark); }
        .wt.es { background: var(--peach-soft);  color: var(--peach-dark); }
        .wcard-word { font-size: 13px; color: var(--text-2); font-weight: 500; }
        .wcard-phon { font-size: 11px; color: var(--text-3); }

        .wcard-foot { padding: 9px 14px 12px; display: flex; align-items: center; justify-content: space-between; }
        .wcard-more { font-size: 11px; font-weight: 600; color: var(--mint-dark); border: none; background: none; cursor: pointer; font-family: inherit; transition: opacity .2s; }
        .wcard-more:hover { opacity: .7; }
        .wcard-play {
            width: 26px; height: 26px; border-radius: 50%;
            background: var(--mint-soft); border: 1.5px solid var(--mint-border);
            color: var(--mint-dark); font-size: 11px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all .2s;
        }
        .wcard-play:hover { background: var(--mint); color: white; border-color: var(--mint); }

        .wcard-detail { padding: 10px 15px 13px; border-top: 1px solid var(--border); background: var(--bg); font-size: 12px; color: var(--text-2); line-height: 1.65; }

        /* Slide-in actions */
        .wcard-actions {
            position: absolute; top: 0; right: -164px; bottom: 0; width: 160px;
            background: var(--surface); border-left: 1.5px solid var(--border);
            display: flex; flex-direction: column; justify-content: center;
            padding: 10px; gap: 5px;
            transition: right .25s cubic-bezier(.4,0,.2,1);
            box-shadow: -4px 0 16px rgba(0,60,30,.07);
        }
        .wcard-actions.open { right: 0; }
        .wca-btn {
            width: 100%; padding: 8px 10px; border-radius: var(--r-xs); border: 1.5px solid transparent;
            font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
            display: flex; align-items: center; gap: 5px; transition: all .15s; white-space: nowrap;
        }
        .wca-btn.lrn { background: var(--mint-soft);  color: var(--mint-dark); border-color: var(--mint-border); }
        .wca-btn.lrn:hover  { background: var(--mint);  color: white; border-color: var(--mint); }
        .wca-btn.rev { background: var(--amber-soft); color: var(--amber-dark); border-color: var(--amber-border); }
        .wca-btn.rev:hover  { background: var(--amber); color: white; border-color: var(--amber); }
        .wca-btn.fav { background: var(--rose-soft);  color: var(--rose); border-color: var(--rose-border); }
        .wca-btn.fav:hover  { background: var(--rose);  color: white; border-color: var(--rose); }

        /* Empty state */
        .empty { grid-column: 1/-1; text-align: center; padding: 44px 20px; color: var(--text-3); }
        .empty i { font-size: 36px; margin-bottom: 12px; display: block; color: var(--mint-border); }
        .empty p { font-size: 14px; font-weight: 600; color: var(--text-2); margin-bottom: 4px; }
        .empty span { font-size: 13px; }

        /* ─── MODAL ─── */
        .overlay { position: fixed; inset: 0; background: rgba(28,43,32,.35); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50; }
        .mbox { background: var(--surface); border-radius: 22px; width: 100%; max-width: 400px; box-shadow: var(--sh-lg); animation: mIn .3s cubic-bezier(.34,1.56,.64,1); overflow: hidden; border: 1.5px solid var(--border); }
        .mbox.wide { max-width: 440px; }
        @keyframes mIn { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .mhdr { padding: 18px 20px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .mttl { font-size: 16px; font-weight: 700; color: var(--text); }
        .mcls { width: 26px; height: 26px; border-radius: 50%; background: var(--bg); border: 1.5px solid var(--border); color: var(--text-3); font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
        .mcls:hover { background: var(--bg-2); color: var(--text); }
        .mbody { padding: 18px 20px; }

        .auth-btn { width: 100%; padding: 11px 16px; margin-bottom: 8px; border-radius: var(--r-sm); border: 1.5px solid var(--border); background: var(--surface); font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .2s; }
        .auth-btn:hover { border-color: var(--mint-border); background: var(--mint-soft); }

        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-box { background: var(--bg); border-radius: var(--r-sm); padding: 14px; text-align: center; border: 1px solid var(--border); }
        .stat-v { font-size: 26px; font-weight: 800; color: var(--mint-dark); line-height: 1; }
        .stat-l { font-size: 11px; color: var(--text-3); margin-top: 4px; font-weight: 600; }

        .finput { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: var(--r-xs); font-size: 14px; font-family: inherit; color: var(--text); background: var(--surface); outline: none; margin-bottom: 10px; transition: border-color .2s, box-shadow .2s; }
        .finput:focus { border-color: var(--mint); box-shadow: 0 0 0 3px rgba(52,211,153,.12); }
        .flabel { font-size: 12px; font-weight: 700; color: var(--text-2); margin-bottom: 5px; display: block; }
        .ava { width: 68px; height: 68px; border-radius: 50%; background: var(--mint-soft); border: 2px solid var(--mint-border); display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--mint-dark); margin: 0 auto 8px; }
        .btn-main { width: 100%; padding: 12px; background: var(--mint-dark); color: white; border: none; border-radius: var(--r-sm); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .2s; margin-top: 6px; }
        .btn-main:hover { background: var(--mint); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- ══════ HEADER ══════ -->
<header class="hdr">
    <div class="hdr-inner">
        <a class="logo" href="#">
            <div class="logo-icon">
                <!--
                  Four-leaf clover: each petal is a bilobate (two-lobe) shape.
                  Petal path (upward): start/end at center (22,22).
                  Curves out L→notch→R tracing two round lobes with a cleft tip.
                  Petals 2-4 rotate 90°/180°/270°. Varying opacity gives depth.
                -->

/* ═══ STATE ═══ */
let curLang='english', curTheme='all', curFilter='browse';
let curDaily=0, curGram=0;
let isLoggedIn=false, isRegMode=false;
let user={nickname:'User',status:'Learning languages',phone:'',email:'',loginDays:0};

/* ═══ INIT ═══ */
function init(){
    updateDailyUI(); updateGramUI(); renderWords(); setLang(curLang); updateCounts();

    document.getElementById('searchBtn').addEventListener('click',handleSearch);
    document.getElementById('searchInput').addEventListener('keypress',e=>{ if(e.key==='Enter')handleSearch(); });
    document.getElementById('searchInput').addEventListener('input',e=>{ if(!e.target.value.trim()){ document.getElementById('searchResult').classList.add('hidden'); document.getElementById('contentGrid').classList.remove('hidden'); } });

    document.getElementById('refreshDaily').addEventListener('click',()=>{ curDaily=(curDaily+1)%DAILY.length; updateDailyUI(); });
    document.getElementById('favoriteDaily').addEventListener('click',()=>{ DAILY[curDaily].fav=!DAILY[curDaily].fav; updateDailyUI(); });
    document.getElementById('moreDaily').addEventListener('click',()=>{ document.getElementById('dailyDetails').classList.toggle('hidden'); });
    document.getElementById('refreshGrammar').addEventListener('click',()=>{ curGram=(curGram+1)%GRAMMAR.length; updateGramUI(); });

    document.querySelectorAll('.theme-btn').forEach(b=>b.addEventListener('click',()=>{
        document.querySelectorAll('.theme-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active'); curTheme=b.dataset.theme; renderWords();
    }));
    document.querySelectorAll('[data-filter]').forEach(b=>b.addEventListener('click',()=>{
        document.querySelectorAll('[data-filter]').forEach(x=>x.classList.remove('active'));
        b.classList.add('active'); curFilter=b.dataset.filter; renderWords();
    }));
    document.querySelectorAll('.language-btn').forEach(b=>b.addEventListener('click',()=>{
        curLang=b.dataset.language; setLang(curLang); renderWords(); updateGramUI();
    }));

    document.getElementById('userProfileBtn').addEventListener('click',()=>{ if(isLoggedIn)openProfile(); else document.getElementById('loginModal').classList.remove('hidden'); });
    document.getElementById('closeLoginModal').addEventListener('click',()=>document.getElementById('loginModal').classList.add('hidden'));
    document.getElementById('closeProfileModal').addEventListener('click',()=>document.getElementById('profileModal').classList.add('hidden'));
    ['loginModal','profileModal'].forEach(id=>document.getElementById(id).addEventListener('click',e=>{ if(e.target===document.getElementById(id))document.getElementById(id).classList.add('hidden'); }));
    document.getElementById('toggleAuthMode').addEventListener('click',toggleAuthMode);
    document.querySelectorAll('.auth-method').forEach(b=>b.addEventListener('click',()=>handleAuth(b.dataset.method)));
    document.getElementById('saveProfile').addEventListener('click',saveProfile);

    document.addEventListener('click',handleClicks);
}

function setLang(l){ document.querySelectorAll('.language-btn').forEach(b=>b.classList.toggle('active',b.dataset.language===l)); }

/* ═══ DAILY ═══ */
function updateDailyUI(){
    const d=DAILY[curDaily];
    document.getElementById('dq-ko').textContent=d.ko;
    document.getElementById('dq-en').textContent=d.en;
    document.getElementById('dq-es').textContent=d.es;
    const fb=document.getElementById('favoriteDaily');
    fb.className='dact fav'+(d.fav?' on':'');
    fb.innerHTML=`<i class="${d.fav?'fas':'far'} fa-heart"></i> ${d.fav?'Saved':'Save'}`;
    document.getElementById('dailyDetails').innerHTML=`<strong>Source:</strong> ${d.source}<br><br>${d.detail}`;
    document.getElementById('dailyDetails').classList.add('hidden');
}

/* ═══ GRAMMAR ═══ */
function updateGramUI(){
    [0,1].forEach(slot=>{
        const gi=(curGram+slot)%GRAMMAR.length;
        const g=GRAMMAR[gi], d=GDET[gi];
        const ex=curLang==='korean'?g.ko:curLang==='spanish'?g.es:g.en;
        document.getElementById('gttl'+slot).textContent=g.title;
        document.getElementById('gex'+slot).textContent=ex;
        document.getElementById('gnote'+slot).textContent=g.usage;
        document.getElementById('gdet'+slot).innerHTML=buildGramDet(d);
        const fb=document.querySelectorAll('.mark-gram-fav')[slot];
        if(fb){ const i=fb.querySelector('i'); if(i)i.className=g.fav?'fas fa-heart':'far fa-heart'; }
    });
}
function buildGramDet(d){
    const txt=curLang==='korean'?d.ko:curLang==='spanish'?d.es:d.en;
    const exs=curLang==='spanish'?d.exEs:d.exKo;
    return `<div style="margin-bottom:6px;">${txt}</div>
            <div style="display:flex;flex-wrap:wrap;gap:5px;">${exs.map(e=>`<span style="font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 8px;color:var(--text-2);">${e}</span>`).join('')}</div>`;
}

/* ═══ COUNTS ═══ */
function updateCounts(){
    document.getElementById('learnedCnt').textContent=WORDS.filter(w=>w.status==='learned').length;
    document.getElementById('reviewCnt').textContent=WORDS.filter(w=>w.status==='review').length;
    document.getElementById('favCnt').textContent=WORDS.filter(w=>w.fav).length;
}

/* ═══ RENDER WORDS ═══ — BUG FIXED: browse always shows 6 words from all statuses */
function renderWords(){
    const grid=document.getElementById('contentGrid');
    let items=[];

    if(curFilter==='browse'){
        /* Show ALL words matching the theme (any status), randomised, 6 at a time */
        const pool=WORDS.filter(w=>curTheme==='all'||w.theme===curTheme);
        const shuffled=[...pool].sort(()=>.5-Math.random());
        items=shuffled.slice(0,6);
    } else if(curFilter==='learned'){
        items=WORDS.filter(w=>w.status==='learned'&&(curTheme==='all'||w.theme===curTheme));
    } else if(curFilter==='review'){
        items=WORDS.filter(w=>w.status==='review'&&(curTheme==='all'||w.theme===curTheme));
    } else if(curFilter==='favorite'){
        items=WORDS.filter(w=>w.fav&&(curTheme==='all'||w.theme===curTheme));
    }

    if(!items.length){
        const msgs={learned:['No learned words yet','Study and press "Learned" on any card'],review:['Nothing in review','Press "Review" on a card to add it here'],favorite:['No favorites yet','Press "Favorite" on any card to save it'],browse:['No words found','Try a different theme']};
        const [t,s]=msgs[curFilter]||['No words found',''];
        grid.innerHTML=`<div class="empty"><i class="fas fa-${curFilter==='favorite'?'heart':curFilter==='review'?'bookmark':curFilter==='learned'?'check-circle':'layer-group'}"></i><p>${t}</p><span>${s}</span></div>`;
        return;
    }
    grid.innerHTML=items.map(w=>buildCard(w)).join('');
}

function buildCard(w){
    const cfg={
        english:{main:w.en, r1:{tag:'KO',cls:'ko',t:w.ko,p:w.kp}, r2:{tag:'ES',cls:'es',t:w.es,p:w.ep}},
        korean: {main:w.ko, r1:{tag:'EN',cls:'en',t:w.en,p:''},    r2:{tag:'ES',cls:'es',t:w.es,p:w.ep}},
        spanish:{main:w.es, r1:{tag:'EN',cls:'en',t:w.en,p:''},    r2:{tag:'KO',cls:'ko',t:w.ko,p:w.kp}},
    }[curLang]||{};
    const dot=w.status!=='default'?`<span class="sdot ${w.status}"></span>`:'';
    const note=NOTES[w.id]||'No additional notes.';
    return `<div class="wcard-wrap">
        <div class="wcard${w.status!=='default'?' '+w.status:''}">
            <div class="wcard-body" data-card-id="${w.id}">
                <div class="wcard-main">${cfg.main}${dot}</div>
                <div class="wcard-langs">
                    <div class="wcard-lang"><span class="wt ${cfg.r1.cls}">${cfg.r1.tag}</span><span class="wcard-word">${cfg.r1.t}</span></div>
                    ${cfg.r1.p?`<div class="wcard-lang" style="margin-left:32px;"><span class="wcard-phon">${cfg.r1.p}</span></div>`:''}
                    <div class="wcard-lang" style="margin-top:3px;"><span class="wt ${cfg.r2.cls}">${cfg.r2.tag}</span><span class="wcard-word">${cfg.r2.t}</span></div>
                </div>
            </div>
            <div class="wcard-foot">
                <button class="wcard-more" data-wid="${w.id}">Details →</button>
                <button class="wcard-play" data-wid="${w.id}"><i class="fas fa-volume-up"></i></button>
            </div>
            <div class="wcard-detail hidden" data-det="${w.id}"><p>${note}</p></div>
        </div>
        <div class="wcard-actions" id="act-${w.id}">
            <button class="wca-btn lrn" data-action="learned" data-wid="${w.id}"><i class="fas fa-${w.status==='learned'?'times':'check'}"></i> ${w.status==='learned'?'Undo':'Learned'}</button>
            <button class="wca-btn rev" data-action="review"  data-wid="${w.id}"><i class="fas fa-${w.status==='review'?'times':'bookmark'}"></i> ${w.status==='review'?'Undo':'Review'}</button>
            <button class="wca-btn fav" data-action="fav"     data-wid="${w.id}"><i class="${w.fav?'fas':'far'} fa-heart"></i> ${w.fav?'Unfav':'Favorite'}</button>
        </div>
    </div>`;
}

/* ═══ CLICK HANDLER ═══ */
function handleClicks(e){
    // Toggle actions panel
    if(e.target.closest('[data-card-id]')&&!e.target.closest('.wcard-more')&&!e.target.closest('.wcard-play')){
        const id=e.target.closest('[data-card-id]').dataset.cardId;
        const panel=document.getElementById('act-'+id);
        if(!panel)return;
        const open=panel.classList.contains('open');
        document.querySelectorAll('.wcard-actions.open').forEach(p=>p.classList.remove('open'));
        if(!open)panel.classList.add('open');
        return;
    }
    // Word actions
    if(e.target.closest('[data-action]')){
        const btn=e.target.closest('[data-action]');
        const wid=parseInt(btn.dataset.wid),act=btn.dataset.action;
        const w=WORDS.find(x=>x.id===wid); if(!w)return;
        if(act==='learned') w.status=w.status==='learned'?'default':'learned';
        if(act==='review')  w.status=w.status==='review'?'default':'review';
        if(act==='fav')     w.fav=!w.fav;
        updateCounts(); renderWords(); return;
    }
    // Detail toggle
    if(e.target.closest('.wcard-more')){
        const wid=e.target.closest('.wcard-more').dataset.wid;
        const det=document.querySelector(`[data-det="${wid}"]`);
        if(det){ det.classList.toggle('hidden'); e.target.textContent=det.classList.contains('hidden')?'Details →':'Close ↑'; }
        return;
    }
    // Play word
    if(e.target.closest('.wcard-play')){
        const wid=parseInt(e.target.closest('.wcard-play').dataset.wid);
        const w=WORDS.find(x=>x.id===wid); if(!w)return;
        const m={english:{t:w.en,l:'en-US'},korean:{t:w.ko,l:'ko-KR'},spanish:{t:w.es,l:'es-ES'}};
        const {t,l}=m[curLang]||m.english; speak(t,l); return;
    }
    // Daily audio
    if(e.target.closest('.play-daily-audio')){
        const d=DAILY[curDaily];
        const m={english:{t:d.en,l:'en-US'},korean:{t:d.ko,l:'ko-KR'},spanish:{t:d.es,l:'es-ES'}};
        const {t,l}=m[curLang]||m.english; speak(t,l); return;
    }
    // Grammar audio
    if(e.target.closest('.play-grammar-audio')){
        const slot=parseInt(e.target.closest('.play-grammar-audio').dataset.slot);
        const gi=(curGram+slot)%GRAMMAR.length; const g=GRAMMAR[gi];
        const m={english:{t:g.en,l:'en-US'},korean:{t:g.ko,l:'ko-KR'},spanish:{t:g.es,l:'es-ES'}};
        const {t,l}=m[curLang]||m.english; speak(t,l); return;
    }
    // Grammar actions
    if(e.target.closest('.mark-gram-learned')){
        const slot=parseInt(e.target.closest('.mark-gram-learned').dataset.slot);
        const gi=(curGram+slot)%GRAMMAR.length;
        GRAMMAR[gi].status=GRAMMAR[gi].status==='learned'?'default':'learned';
        updateGramUI(); return;
    }
    if(e.target.closest('.mark-gram-review')){
        const slot=parseInt(e.target.closest('.mark-gram-review').dataset.slot);
        const gi=(curGram+slot)%GRAMMAR.length;
        GRAMMAR[gi].status=GRAMMAR[gi].status==='review'?'default':'review';
        updateGramUI(); return;
    }
    if(e.target.closest('.mark-gram-fav')){
        const slot=parseInt(e.target.closest('.mark-gram-fav').dataset.slot);
        const gi=(curGram+slot)%GRAMMAR.length;
        GRAMMAR[gi].fav=!GRAMMAR[gi].fav; updateGramUI(); return;
    }
}

/* ═══ AUDIO ═══ */
function speak(text,lang='en-US'){
    if(!('speechSynthesis' in window)||!text)return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text); u.lang=lang; u.rate=0.85;
    speechSynthesis.speak(u);
}

/* ═══ SEARCH ═══ */
async function handleSearch(){
    const term=document.getElementById('searchInput').value.trim();
    const langOpt=document.getElementById('translateLang').value;
    if(!term)return;
    if(langOpt!=='en'){ await handleTranslation(term,langOpt); return; }
    const lo=term.toLowerCase();
    const local=WORDS.filter(w=>w.en.toLowerCase().includes(lo)||w.ko.includes(lo)||w.es.toLowerCase().includes(lo));
    if(local.length){ showLocalResults(local); return; }
    try{
        const res=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${lo}`);
        if(res.ok)showAPIResults(await res.json()); else showMsg('No results found.','error');
    }catch{ showMsg('Could not connect to dictionary.','error'); }
}
async function handleTranslation(text,pair){
    const [src,tgt]=pair.split('-');
    const sr=document.getElementById('searchResult');
    sr.classList.remove('hidden');
    sr.innerHTML=`<div class="result-card" style="text-align:center;color:var(--text-3);"><i class="fas fa-spinner fa-spin"></i> Translating…</div>`;
    document.getElementById('contentGrid').classList.add('hidden');
    try{
        const res=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}`);
        const d=await res.json();
        if(d.responseStatus===200){
            const n={en:'English',ko:'Korean',es:'Spanish'},t=d.responseData.translatedText,tl=tgt==='ko'?'ko-KR':tgt==='es'?'es-ES':'en-US';
            sr.innerHTML=`<div class="result-card">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
                    <div><div style="font-size:17px;font-weight:700;color:var(--text);">Translation</div><div style="font-size:12px;color:var(--text-3);margin-top:2px;">${n[src]||src} → ${n[tgt]||tgt}</div></div>
                    <button onclick="speak('${t.replace(/'/g,"\\'").replace(/"/g,'\\"')}','${tl}')" style="width:32px;height:32px;border-radius:50%;background:var(--mint-soft);border:1.5px solid var(--mint-border);color:var(--mint-dark);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;"><i class="fas fa-volume-up"></i></button>
                </div>
                <div style="background:var(--bg);border-radius:var(--r-xs);padding:10px 14px;margin-bottom:8px;"><div style="font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px;">${n[src]}</div><div style="font-size:15px;color:var(--text);">${text}</div></div>
                <div style="background:var(--mint-soft);border:1.5px solid var(--mint-border);border-radius:var(--r-xs);padding:10px 14px;"><div style="font-size:10px;font-weight:700;color:var(--mint-dark);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px;">${n[tgt]}</div><div style="font-size:15px;font-weight:700;color:var(--text);">${t}</div></div>
            </div>`;
        } else showMsg('Translation failed.','error');
    }catch{ showMsg('Translation service unavailable.','error'); }
}
function showLocalResults(items){
    const sr=document.getElementById('searchResult'); sr.classList.remove('hidden');
    sr.innerHTML=`<div class="result-card"><div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;">Found ${items.length} result${items.length>1?'s':''}</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">${items.slice(0,6).map(w=>`<div style="background:var(--bg);border-radius:var(--r-xs);padding:11px 13px;"><div style="font-weight:700;font-size:14px;color:var(--text);margin-bottom:3px;">${w.en}</div><div style="font-size:12px;color:var(--text-2);">${w.ko}</div><div style="font-size:12px;color:var(--text-3);">${w.es}</div></div>`).join('')}</div></div>`;
    document.getElementById('contentGrid').classList.add('hidden');
}
function showAPIResults(api){
    const w=api[0],sr=document.getElementById('searchResult'); sr.classList.remove('hidden');
    sr.innerHTML=`<div class="result-card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;"><div><div style="font-size:26px;font-weight:700;color:var(--text);">${w.word}</div>${w.phonetic?`<div style="font-size:13px;color:var(--text-3);margin-top:2px;">${w.phonetic}</div>`:''}</div><button onclick="speak('${w.word}','en-US')" style="width:34px;height:34px;border-radius:50%;background:var(--mint-soft);border:1.5px solid var(--mint-border);color:var(--mint-dark);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;"><i class="fas fa-volume-up"></i></button></div>${w.meanings.map(m=>`<div style="margin-bottom:14px;"><span style="display:inline-block;background:var(--mint);color:white;font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 9px;border-radius:4px;margin-bottom:8px;">${m.partOfSpeech}</span>${m.definitions.slice(0,2).map((d,i)=>`<div style="font-size:13px;color:var(--text-2);line-height:1.55;margin-bottom:6px;"><span style="color:var(--text-3);">${i+1}.</span> ${d.definition}${d.example?`<div style="font-size:12px;color:var(--text-3);font-style:italic;margin-top:2px;">"${d.example}"</div>`:''}</div>`).join('')}${m.synonyms?.length?`<div style="font-size:12px;color:var(--text-2);margin-top:3px;"><strong>Synonyms:</strong> ${m.synonyms.slice(0,5).join(', ')}</div>`:''}</div>`).join('')}</div>`;
    document.getElementById('contentGrid').classList.add('hidden');
}
function showMsg(msg,type){ const sr=document.getElementById('searchResult'); sr.classList.remove('hidden'); sr.innerHTML=`<div class="result-card" style="color:${type==='error'?'var(--rose)':'var(--text-2)'};">${msg}</div>`; document.getElementById('contentGrid').classList.add('hidden'); }

/* ═══ AUTH ═══ */
function toggleAuthMode(){ isRegMode=!isRegMode; document.getElementById('authModalTitle').textContent=isRegMode?'Create Account':'Sign In'; document.getElementById('authSub').textContent=isRegMode?'Choose your register method':'Choose your login method'; document.getElementById('toggleAuthMode').textContent=isRegMode?'Switch to Sign In':'Switch to Register'; }
function handleAuth(){ isLoggedIn=true; user.loginDays=isRegMode?1:5; document.getElementById('loginModal').classList.add('hidden'); openProfile(); }
function openProfile(){ document.getElementById('profileNickname').value=user.nickname; document.getElementById('profileStatus').value=user.status; document.getElementById('profilePhone').value=user.phone; document.getElementById('profileEmail').value=user.email; document.getElementById('loginDays').textContent=user.loginDays; document.getElementById('learnedWordsProfile').textContent=WORDS.filter(w=>w.status==='learned').length; document.getElementById('profileModal').classList.remove('hidden'); }
function saveProfile(){ user.nickname=document.getElementById('profileNickname').value; user.status=document.getElementById('profileStatus').value; user.phone=document.getElementById('profilePhone').value; user.email=document.getElementById('profileEmail').value; document.getElementById('profileModal').classList.add('hidden'); }

init();
</script>
